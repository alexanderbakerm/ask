<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="iridescent-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD2C7"></stop>
      <stop offset="50%" stop-color="#FFA9D8"></stop>
      <stop offset="100%" stop-color="#C4B5FD"></stop>
    </linearGradient>
    
    <radialGradient id="iridescent-a" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>
    
    <radialGradient id="iridescent-b" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#FFD2C7" stop-opacity="0.8"></stop>
      <stop offset="100%" stop-color="#FFD2C7" stop-opacity="0"></stop>
    </radialGradient>
    
    <radialGradient id="iridescent-c" cx="75%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.7"></stop>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0"></stop>
