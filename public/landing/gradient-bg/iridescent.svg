  </defs>
  <rect width="1200" height="800" fill="url(#iridescent-base)"></rect>
  <rect width="1200" height="800" fill="url(#iridescent-a)"></rect>
  <rect width="1200" height="800" fill="url(#iridescent-b)"></rect>
  <rect width="1200" height="800" fill="url(#iridescent-c)"></rect>
</svg>